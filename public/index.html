<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaGrab</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-download"></i> MediaGrab</h1>
        <p>Download MP3, MP4 or Image from any URL</p>

        <input type="text" id="url" placeholder="Paste your URL here...">

        <div class="buttons">
            <button class="btn mp3" data-type="1"><i class="fas fa-music"></i> MP3</button>
            <button class="btn mp4" data-type="2"><i class="fas fa-video"></i> MP4</button>
            <button class="btn img" data-type="3"><i class="fas fa-image"></i> Image</button>
        </div>

        <div id="status"></div>
        <div id="progress-bar" class="hidden">
            <div id="progress"></div>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('url');
        const status = document.getElementById('status');
        const progressBar = document.getElementById('progress-bar');
        const progress = document.getElementById('progress');

        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const url = urlInput.value.trim();
                if (!url) {
                    status.textContent = 'Please enter a URL';
                    status.className = 'error';
                    return;
                }

                status.textContent = 'Downloading...';
                status.className = 'loading';
                progressBar.classList.remove('hidden');
                progress.style.width = '0%';

                let p = 0;
                const interval = setInterval(() => {
                    p = Math.min(p + Math.random() * 15, 90);
                    progress.style.width = p + '%';
                }, 500);

                fetch('/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, type: btn.dataset.type })
                })
                .then(res => {
                    clearInterval(interval);
                    progress.style.width = '100%';

                    if (!res.ok) throw new Error('Download failed');
                    return res.blob();
                })
                .then(blob => {
                    const disposition = blob.headers?.get('content-disposition');
                    const filename = disposition
                        ? disposition.split('filename=')[1]?.replace(/"/g, '')
                        : 'download';

                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = filename;
                    a.click();

                    status.textContent = 'Download complete!';
                    status.className = 'success';
                })
                .catch(err => {
                    clearInterval(interval);
                    status.textContent = 'Error: ' + err.message;
                    status.className = 'error';
                });
            });
        });
    </script>
</body>
</html>
