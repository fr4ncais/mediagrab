<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaGrab</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-download"></i> MediaGrab</h1>
        <p>Download MP3, MP4 or Image from any URL</p>

        <input type="text" id="url" placeholder="Paste your URL here...">

        <div class="buttons">
            <button class="btn mp3" data-type="1"><i class="fas fa-music"></i> MP3</button>
            <button class="btn mp4" data-type="2"><i class="fas fa-video"></i> MP4</button>
            <button class="btn img" data-type="3"><i class="fas fa-image"></i> Image</button>
        </div>

        <div id="status"></div>

        <div id="progress-container" class="hidden">
            <div id="progress-bar">
                <div id="progress-fill"></div>
            </div>
            <div id="progress-info">
                <span id="progress-pct">0%</span>
                <span id="progress-speed"></span>
                <span id="progress-eta"></span>
            </div>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('url');
        const status = document.getElementById('status');
        const progressContainer = document.getElementById('progress-container');
        const progressFill = document.getElementById('progress-fill');
        const progressPct = document.getElementById('progress-pct');
        const progressSpeed = document.getElementById('progress-speed');
        const progressEta = document.getElementById('progress-eta');

        // Connect to SSE for real-time progress
        let eventSource = null;

        function connectSSE() {
            if (eventSource) eventSource.close();
            eventSource = new EventSource('/progress');
            eventSource.onmessage = (e) => {
                const data = JSON.parse(e.data);
                updateProgress(data);
            };
        }

        function updateProgress(data) {
            if (data.status === 'downloading') {
                progressContainer.classList.remove('hidden');
                progressFill.style.width = data.percent + '%';
                progressPct.textContent = data.percent.toFixed(1) + '%';
                if (data.speed) progressSpeed.textContent = data.speed;
                if (data.eta) progressEta.textContent = 'ETA ' + data.eta;
                status.textContent = 'Downloading...';
                status.className = 'loading';
            } else if (data.status === 'converting') {
                progressFill.style.width = '95%';
                progressPct.textContent = '95%';
                status.textContent = 'Converting audio...';
                status.className = 'loading';
            } else if (data.status === 'done') {
                progressFill.style.width = '100%';
                progressPct.textContent = '100%';
                status.textContent = 'Download complete!';
                status.className = 'success';
                setTimeout(() => {
                    progressContainer.classList.add('hidden');
                }, 2000);
            } else if (data.status === 'error') {
                status.textContent = 'Error: ' + (data.text || 'Download failed');
                status.className = 'error';
                progressContainer.classList.add('hidden');
            }
        }

        // Start SSE connection on load
        connectSSE();

        // Download button logic
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const url = urlInput.value.trim();
                if (!url) {
                    status.textContent = 'Please enter a URL';
                    status.className = 'error';
                    return;
                }

                // Reset progress
                progressFill.style.width = '0%';
                progressPct.textContent = '0%';
                progressSpeed.textContent = '';
                progressEta.textContent = '';
                status.textContent = 'Starting download...';
                status.className = 'loading';
                progressContainer.classList.remove('hidden');

                // Reconnect SSE in case it dropped
                connectSSE();

                fetch('/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, type: btn.dataset.type })
                })
                .then(res => {
                    if (!res.ok) throw new Error('Download failed');
                    return res.blob();
                })
                .then(blob => {
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = 'download';
                    a.click();
                })
                .catch(err => {
                    status.textContent = 'Error: ' + err.message;
                    status.className = 'error';
                    progressContainer.classList.add('hidden');
                });
            });
        });
    </script>
</body>
</html>
